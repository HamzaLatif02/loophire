services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: loophire
      POSTGRES_USER: loophire
      POSTGRES_PASSWORD: loophire
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loophire
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loophire -d loophire"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://loophire:loophire@postgres:5432/loophire
    ports:
      - "8000:8000"
    networks:
      - loophire
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - loophire
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  loophire:
    driver: bridge
